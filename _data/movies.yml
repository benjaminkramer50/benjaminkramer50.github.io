- title: "Looper"
  year: 2012
  director: "Rian Johnson"
  rating: 1.5
  genre: "Sci-Fi"
  date_watched: "2026-05-03"
  thesis: "A promising time-travel thriller that never fully convinces because the people inside it feel less real than the idea driving them."
  verdict: "Interesting premise, messy execution."
  lenses:
    - time-travel
    - characterization
    - structure
    - performance
  review: |-
    `Looper` had an interesting premise, but I found the movie pretty messy overall. The idea itself is strong enough, and I can see why the concept would be compelling, but the execution never really felt as coherent as it needed to be. A big issue for me was that the characters did not feel especially real or grounded. They were not exactly shallow or one-dimensional, but their motivations felt odd and not fully believable, so I had a hard time feeling invested in what was happening to them.

    I also do not feel like the movie did a very good job respecting the logic of its own time-travel setup. I am not saying every sci-fi film needs to explain everything perfectly, but here it felt like the rules were loose in a way that made the story harder to trust. That made the movie feel less clean than it wanted to be, and the result was that the whole thing came across as more confusing than compelling.

    I also did not think any of the performances were especially great, which made the weaker parts of the movie stand out even more. There is a decent idea at the center of it, but I do not think the film really managed to turn that idea into something that felt fully convincing.

- title: "Brick"
  year: 2005
  director: "Rian Johnson"
  rating: 5
  genre: "Mystery thriller"
  date_watched: "2026-05-02"
  thesis: "An extremely stylized mystery that works because it commits completely to its own vocabulary and mood."
  verdict: "Very strong and very controlled."
  lenses:
    - style
    - dialogue
    - mystery
    - tone
    - performance
  review: |-
    `Brick` is one of those movies that should not work as well as it does, but it ends up being really compelling because of how completely it commits to what it is doing. The language, the atmosphere, and the way the movie frames the mystery all make it feel like its own little world rather than a copy of anything else. I especially liked how deliberate it was. Even when the characters are speaking in a way that feels strange, it does not feel random. It feels designed.

    What made it work for me is that the style is not just style for its own sake. It actually gives the movie shape. The characters feel contained by the world they are in, and the strange dialogue becomes part of the experience instead of a distraction. I thought the movie had a very strong sense of control, and that is what made it so effective.

- title: "Under the Silver Lake"
  year: 2018
  director: "David Robert Mitchell"
  rating: 5
  genre: "Black comedy thriller"
  date_watched: "2026-05-02"
  favorite: true
  thesis: "A paranoid, image-saturated movie that is more interesting as atmosphere and pattern than as a mystery with a clean solution."
  verdict: "I liked it a lot."
  lenses:
    - mystery
    - atmosphere
    - symbolism
    - structure
    - paranoia
  review: |-
    `Under the Silver Lake` is the kind of movie that feels like it is operating on several levels at once, and I found that very compelling. I do not think the mystery itself needs to be solved in any neat way for the movie to work, because the real strength is in the atmosphere and the way it keeps expanding outward. It feels restless, skeptical, and a little obsessive, which fits the character and the world around him.

    I also liked how the movie kept making me pay attention to details without ever making the details feel decorative. It is not just filling the frame with references; it is using that density to create a specific mood. I think the movie works best when you treat it as a long drift through obsession rather than as a puzzle with one answer. That is what makes it interesting to me.

