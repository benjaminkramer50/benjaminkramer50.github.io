  rating: 2
  genre: "Sports drama"
  date_watched: "2026-04-28"
  thesis: "A sequel with some strong ideas and performances, but not enough depth or control to make the conflict feel fully earned."
  verdict: "Interesting, but undercooked."
  lenses:
    - performance
    - sequel
    - conflict
    - direction
    - legacy
  review: |-
    `Creed III` is the weakest of the Creed films for me because it feels like it has the right ingredients without fully developing them. I could see what it wanted to do with the personal conflict, and I thought the movie had some decent energy, but I never felt like the emotional center was as strong as it needed to be. The story kept moving, but not always in a way that made the drama feel especially deep or convincing.

    I also think the movie is less interesting when it leans on the idea of rivalry without giving the characters enough complexity around it. There are parts of it that work, and I do think some of the performances carry more weight than the script does, but overall it felt thinner than the earlier films. I did not think it was bad, just not as substantial as it should have been.

- title: "Creed II"
  year: 2018
  director: "Steven Caple Jr."
  rating: 3
  genre: "Sports drama"
  date_watched: "2026-04-29"
  thesis: "A sequel that has real emotional material, but sometimes feels too dependent on the shape of the first film."
  verdict: "Solid, but not as strong as it wants to be."
  lenses:
    - sequel
    - family
    - sports drama
    - legacy
    - emotion
  review: |-
    `Creed II` is a movie I respect more than I love. I think it has enough emotional continuity with the first film to justify itself, and I do think the family material gives it some weight. The problem is that it sometimes feels like it is borrowing too much from a familiar structure instead of finding a sharper identity of its own. As a result, some of the drama feels effective in the moment but less memorable once the movie is over.

    That said, I still thought there was a lot in it that worked. The central relationships matter, and the movie understands that this kind of story depends on more than just the fights. It is at its best when it is thinking about inheritance, pressure, and the feeling of trying to live inside someone else's legacy. I do not think it reaches the level of the first Creed, but it is still a good movie.

- title: "Creed"
  year: 2015
  director: "Ryan Coogler"
  rating: 4
  genre: "Sports drama"
  date_watched: "2026-04-28"
  thesis: "A rare legacy sequel that finds its own emotional life and does not just survive off the franchise it came from."
  verdict: "The best Creed film."
  lenses:
    - character
    - legacy
    - performance
    - sports drama
    - emotion
  review: |-
    `Creed` works because it understands that the movie is not really about copying the Rocky formula so much as revisiting it from a different place. The film gives Adonis his own energy and his own pressures, and that makes it feel like more than a continuation. I thought the character work was strong, and I also thought the movie did a very good job balancing the emotional inheritance of the franchise with something that felt fresh.

    What stood out to me most was that the movie actually cares about how people carry themselves and what they are trying to prove. It does not just treat boxing as spectacle; it treats it as a way of making internal conflict visible. That is what gives it weight. I think it is a very good sports movie, and more importantly, a movie that knows why the sports part matters.

- title: "Training Day"
  year: 2001
  director: "Antoine Fuqua"
  rating: 5
  genre: "Crime thriller"
  date_watched: "2026-04-23"
  favorite: true
  thesis: "A tense, performance-driven crime film that works because it keeps the moral pressure constant."
  verdict: "Very effective."
  lenses:
    - performance
    - crime
    - tension
    - morality
    - power
  review: |-
    `Training Day` is a very effective movie because it understands exactly what kind of pressure it wants to create and then keeps applying it. The whole film depends on tension, charisma, and the feeling that the situation could tip at any moment, and I thought it handled that well. The performances are a big part of that, obviously, but the movie also knows how to keep the momentum tight so that the story never really relaxes.

    What I liked most was the way the film makes the power dynamics feel unstable. It is not just about one character being good and another being bad. It is about how authority, fear, and self-interest all get mixed together until the whole thing feels morally compromised. That gives the movie more force than it would have otherwise. I think it is a strong crime film, and one that knows how to keep its edge.

