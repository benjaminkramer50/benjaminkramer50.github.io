    - community
    - character
    - crime
    - restraint
  review: |-
    `Boyz n the Hood` is an incredibly well-made film. What I liked most was that it gives Tre a steady perspective without turning him into a blank audience surrogate. The people around him feel specific rather than symbolic, which makes the movie feel much more alive. It is about environment and pressure, but it never loses sight of the fact that these are actual people living inside those pressures.

    The film also has a real sense of control. It does not oversell itself, and that restraint helps the emotional moments land harder. I thought the movie was very good at showing how different kinds of masculinity, ambition, and instability shape the world around these characters. It feels honest without being formless, which is not easy to do.
  
- title: "The Godfather"
  year: 1972
  director: "Francis Ford Coppola"
  rating: 5
  genre: "Crime drama"
  date_watched: "2026-04-17"
  thesis: "A masterfully controlled crime saga where every formal choice adds weight to the family drama."
  verdict: "One of the great films."
  lenses:
    - cinematography
    - soundtrack
    - performance
    - family
    - legacy
  review: |-
    Credit where credit is due: the cinematography, soundtrack, and performances are remarkable across the board. Nearly every scene feels deliberate, building the story's weight without wasting motion. This is not my first time watching this movie, and I enjoyed it much more on second watch.

    There is no definite "protagonist" (one could argue Vito, and then Michael in the latter half), however the emotional side emits a resonance from the Corleones as their personal lives are depicted at scale, as opposed to others. That is part of what makes the movie feel so complete. It is not just telling a crime story; it is building a whole social and emotional order around that story.

    This is arguably the movie that defined and inspired the "Gangster" or more broad "Crime drama" genre, and lives up to its name. The main cast is incredibly multi-dimensional (credits of course to the actors) and you can see the range of feelings they display and how this range either widens or becomes concentrated as the movie progresses. It feels as controlled as it is expansive, which is a hard balance to strike.
