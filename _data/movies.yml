- title: "Blood In Blood Out"
  year: 1991
  director: "Taylor Hackford"
  rating: 5
  genre: "Crime drama"
  date_watched: "2026-04-22"
  review: "Wow. This is one of the best films I have ever seen. It is a tale of growth, whether positive or negative, and the impact of society and relationships of personal development. The lineage of the characters and their impacts on each other, while ostensibly simple, are extremely, and I mean *extremely* complex. 

The multi-faceted nature of the development of each character is outstanding, and the film's length is necessary. Throughout the film, we see the convergence, divergence, and intertwining between Miklo, Paco, and Cruz. The acting, to me, is oustanding, particularly in these three main characters. 

The raw emotion that is illustrated, including Miklo's desire to fit in and Paco's desire to stand out is so sharp. This emotion and illustration of the events in their lives provides multiple perspectives towards how their narratives develop and why they make the choices they make."
  favorite: true

