- title: "The Godfather"
  year: 1972
  director: "Francis Ford Coppola"
  rating: 5
  genre: "Crime drama"
  date_watched: "2026-04-17"
  review: "Credit where credit is due: the cinematography, soundtrack, and performances are remarkable across the board. Nearly every scene feels deliberate, building the story's weight without wasting motion. This is not my first time watching it, and I enjoyed it much more on second watch.

There is no definite protagonist (one could argue Vito, and then Michael in the latter half), however the emotional side emits a resonance from the Corleones as their personal lives are depicted at scale, as opposed to others.

This is arguably the movie that defined and inspired the gangster or broader crime drama genre, and lives up to its name. The main cast is incredibly multi-dimensional (credits of course to the actors) and you can see the range of feelings they display and how this range either widens or becomes concentrated as the movie progresses."
