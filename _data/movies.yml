- title: "Clockers"
  year: 1995
  director: "Spike Lee"
  rating: 3.5
  genre: "Crime drama"
  date_watched: "2026-04-21"
  review: "The plot was quite convoluted (which may have been part of the point), however the movie was well-acted and the message and takeaways were incredibly impactful. I also believe the movie did a lot more \"telling\" than \"showing\", which I think is alright to an extent, however it disrupted the narrative of the characters. I do think that there were lots of unanswered questions, relating to Strike's condition. Also, there were lots relating to the narrative in general as there seemed to be many changes/assumptions as to what happened depending on the perspective of the character."

