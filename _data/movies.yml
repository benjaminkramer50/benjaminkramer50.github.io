- title: "Looper"
  year: 2012
  director: "Rian Johnson"
  rating: 1.5
  genre: "Sci-Fi"
  date_watched: "2026-05-03"
  review: |-
    It had an interesting premise, but I found the movie pretty messy overall. The idea itself is strong enough, and I can see why the concept would be compelling, but the execution never really felt as coherent as it needed to be. A big issue for me was that the characters did not feel especially real or grounded. They were not exactly shallow or one-dimensional, but their motivations felt odd and not fully believable, so I had a hard time feeling invested in what was happening to them.

    I also do not feel like the movie did a very good job respecting the logic of its own time-travel setup. I am not saying every sci-fi film needs to explain everything perfectly, but here it felt like the rules were loose in a way that made the story harder to trust. That made the movie feel less clean than it wanted to be, and the result was that the whole thing came across as more confusing than compelling.

    I also did not think any of the performances were especially great, which made the weaker parts of the movie stand out even more. There is a decent idea at the center of it, but I do not think the film really managed to turn that idea into something that felt fully convincing.

- title: "Brick"
  year: 2005
  director: "Rian Johnson"
  rating: 5
  genre: "Mystery thriller"
  date_watched: "2026-05-02"
  review: |-
    I really liked Brick. The dialogue is obviously not realistic in any normal high school sense, but I do not think that is a real problem here, because the movie is not trying to sound like ordinary teenagers. It is trying to sound like a hardboiled detective story that got dropped into a suburban high school, and I think that tension is what makes it interesting. The dialogue is witty, strange, and self-conscious in a way that could have been annoying, but instead it gives the movie a very distinct rhythm. The characters also feel memorable in that noir way where everyone seems a little too sharp, a little too evasive, and a little too specific to be accidental.

    What really made it work for me, though, was the atmosphere. The whole thing has this gray, hazy, drained look to it that fits the story really well. The setting feels barren and isolated, and the background noise and visual texture make the movie feel even more uneasy. It is one of those films where the landscape is doing a lot of the work. The emptiness of the environment makes the whole mystery feel more serious, even when the dialogue is kind of absurd on purpose.

    It also gave me Twin Peaks pilot vibes, which I mean in a good way. Both of them take something familiar and slightly banal, then make it feel unsettling by pushing the mood just a little off center. Brick is obviously much more neo-noir and less surreal, but it has that same feeling of a world that is not quite stable, where the mood matters as much as the plot. I think that is what I liked most about it. It is a movie that knows exactly what kind of strange it wants to be, and it commits to it all the way through.

- title: "Under the Silver Lake"
  year: 2018
  director: "David Robert Mitchell"
  rating: 5
  genre: "Black comedy thriller"
  date_watched: "2026-05-02"
  favorite: true
  review: |-
    I really liked Under the Silver Lake. It is one of those movies that feels overloaded on purpose, but in a way that is genuinely productive rather than just messy. What I liked most is that the film keeps asking you to look for meaning in things that may or may not actually mean anything. That is what makes it interesting to me. The mystery is not just "what happened," but how far the movie can push the idea that interpretation itself becomes part of the trap.

    I think the film works because it is so committed to paranoia. The protagonist is not really a stable guide through the story, and I do not think the movie wants him to be. He feels completely swallowed up by obsession, which makes the whole thing feel unstable in a way that is very effective. The logic keeps shifting under him, and that creates a kind of tension that is different from a normal detective story. It is less about solving a case than about watching someone become increasingly unable to tell the difference between pattern and delusion.

    The movie is also doing a lot formally. It has a very specific relationship to Los Angeles, and I think that matters a lot. The city feels full of surfaces, codes, fake clues, and half-hidden systems, which fits the whole movie's interest in secrecy and performance. I also liked that it can be funny without losing its sense of threat. It has this strange balance where the whole thing can feel ridiculous and serious at the same time, which is exactly the kind of thing I want from a good neo-noir.

    Since neo-noir is my favorite genre, this was very much my kind of movie. It is intricate, self-conscious, and deeply suspicious of the world it is showing you. I do think the mystery is the point, but not in the usual puzzle-box way. The point is the experience of trying to decode something that may never settle into one clean answer. That is what makes it so compelling to me.

- title: "Creed II"
  year: 2018
  director: "Steven Caple Jr."
  rating: 3
  genre: "Sports drama"
  date_watched: "2026-04-29"
  review: |-
    I thought this was solid, but not as strong as the first one. It has enough emotional material to make it worthwhile, and I do think the family side of the story gives it some real weight. There is clearly something interesting in the idea of legacy, inheritance, and the way people get trapped inside expectations that were built before they even had a chance to make their own choices.

    At the same time, I felt like it was too dependent on trying to redo the Drago thing, and that part felt forced to me. It makes the movie feel a little too familiar, like it is borrowing too much from an earlier conflict instead of finding a sharper identity of its own. I never disliked it, but I did feel like I could see the framework more clearly than I wanted to.

    What did work for me was the emotional continuity. The movie does understand that the fights matter less than the relationships around them, and I thought that part was handled well. It is still a good movie, but it did not feel as fresh or as complete to me as the first one.

- title: "Creed III"
  year: 2023
  director: "Michael B. Jordan"
  rating: 2
  genre: "Sports drama"
  date_watched: "2026-04-28"
  review: |-
    I thought this was the weakest of the three. It has some interesting ideas, and I do think there are parts of it that work, but the movie never really came together in a way that felt fully satisfying. The conflict is there, and the performances are fine, but I did not feel like the emotional center was developed enough to make the whole thing feel convincing.

    It feels like the movie wants to be more personal and more intense than the earlier films, but I do not think it gets enough depth out of its central relationship. Some of it feels like it is trying to build tension by default instead of really earning it. That makes the movie less substantial than it should be.

    I do not think it is bad, and I can see what it was going for, but it felt thinner to me than the other two. It has energy, but not enough control or complexity to make that energy really land.

- title: "Creed"
  year: 2015
  director: "Ryan Coogler"
  rating: 4
  genre: "Sports drama"
  date_watched: "2026-04-28"
  review: |-
    I thought this was a very good movie. What made it work for me was that it did not just feel like a continuation of the Rocky series, but like something that had its own point of view. Adonis feels like a real character with his own pressures and insecurities, and the movie is smart enough to let that be the center of the story instead of just treating him like a replacement for someone else.

    I also thought the movie did a good job with the emotional side of the story. It understands that boxing is only part of what is going on. A lot of the film is about identity, inheritance, and the feeling of trying to prove something without really knowing whether you are proving it to yourself or to other people. That gave it more weight for me than I expected.

    The performances were strong, and the movie has a really good sense of momentum. It does not feel like it is just going through the motions of a sports drama. It feels focused, and I think that is what made it stand out to me. It has a good balance of being sincere without feeling overly sentimental, and I think that is why it works so well.

