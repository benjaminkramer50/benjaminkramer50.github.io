  date_watched: "2026-04-21"
  thesis: "A tightly controlled crime film that moves with purpose and never wastes a scene."
  verdict: "Technically near-perfect."
  lenses:
    - structure
    - pace
    - performance
    - crime
    - dread
  review: |-
    `Menace II Society` is technically near-perfect. It is tightly directed, sharply acted, and paced so that nearly every scene feels like it matters to Caine's progression. What I appreciated most was how little waste there is in the movie. It does not linger when it does not need to, and that gives it a very specific kind of force. The film feels serious from the beginning and stays that way.

    I also think the movie is effective because it does not just rely on one dramatic moment. It builds dread through accumulation. The characters, the surroundings, and the choices they make all feel connected, and the result is a movie that feels both immediate and inevitable. It is a very strong crime film and one that handles its material with a lot of control.

- title: "Boyz n the Hood"
  year: 1991
