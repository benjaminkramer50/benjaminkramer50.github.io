  verdict: "Good, but uneven."
  lenses:
    - crime
    - style
    - performance
    - tone
    - structure
  review: |-
    `King of New York` has a lot of personality, and I think that is the main reason it holds together. The movie is strongest when it is leaning on atmosphere and on the central performance, because that gives it a real sense of attitude. At the same time, I do think the film is a little looser than it wants to be. It has energy, but not always enough structure to make that energy feel fully organized.

    I do not think that makes it bad. In some ways the looseness is part of its appeal, because it gives the movie a rougher and more unstable quality. But compared with the sharper crime films I like most, this one feels less controlled. I liked it, just not enough to call it one of the greats.

- title: "Blood In Blood Out"
  year: 1991
  director: "Taylor Hackford"
  rating: 5
  genre: "Crime drama"
  date_watched: "2026-04-22"
  favorite: true
  thesis: "An unusually ambitious crime drama about identity, family, and social pressure, carried by the scale of its characters' relationships."
  verdict: "One of the best films I have seen."
  lenses:
    - character
    - family
    - identity
    - crime
    - performance
  review: |-
    `Blood In Blood Out` is one of the best films I have ever seen. What makes it work is not just the story itself, but the way the movie treats growth as something complicated and often contradictory. It is a film about family, loyalty, resentment, and the way environment shapes what people think they are allowed to become. The character relationships are much more complex than they first appear, and I think the movie earns that complexity over time.

    The thing I kept coming back to was how strongly the film understands the intertwined lives of Miklo, Paco, and Cruz. Their narratives do not just run side by side; they keep converging, diverging, and affecting each other in ways that feel meaningful. I also thought the acting was excellent, especially in those central roles, because the performances give the movie the raw emotion it needs. It is long, but I think it needs that length. The movie is doing a lot, and I think it does most of it very well.

- title: "Clockers"
  year: 1995
  director: "Spike Lee"
  rating: 3.5
  genre: "Crime drama"
  date_watched: "2026-04-21"
  thesis: "A messy but serious film that is often more compelling in its concerns than in its construction."
  verdict: "Frustrating, but worthwhile."
  lenses:
    - structure
    - perspective
    - social realism
    - performance
    - ambiguity
  review: |-
    `Clockers` is a movie I admire even though I do not think it fully comes together. The plot is convoluted in a way that may be intentional, but it also makes the movie harder to follow than it needs to be. At the same time, I thought the performances were strong and the film clearly has things it wants to say, so I never felt like it was empty. If anything, it sometimes feels like it has too much on its mind at once.

    What I had the hardest time with was the amount of telling versus showing. I can accept that to a point, but here it makes the movie feel more explanatory than dramatic. There are also enough unanswered questions, especially around Strike and the broader narrative logic, that the film ends up feeling somewhat unstable. Still, I think the message and the atmosphere are powerful, and that keeps it interesting even when it is frustrating.

- title: "Menace II Society"
  year: 1993
