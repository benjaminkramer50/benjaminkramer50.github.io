---
layout: default
---
<main class="page-content">
  <h1 class="page-title">{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.author %} &middot; {{ page.author }}{% endif %}</p>
  {% if page.tags.size > 0 %}
  <div class="blog-post-tags" style="margin-bottom: 1.5rem;">
    {% for tag in page.tags %}
    <span class="blog-tag-badge">{{ tag | replace: "-"," " }}</span>
    {% endfor %}
  </div>
  {% endif %}
  <div class="content">
    {{ content }}
  </div>
  <div class="post-back">
    <a href="/writing/">&larr; Back to Writing</a>
  </div>
</main>
