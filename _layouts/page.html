<!doctype html>
<html lang="en">
  <head>
    {% include meta.html %}
    <script>
    (function(){var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/css/main.css">
  </head>
  <body>
    {% include theme-toggle.html %}

    {% include navigation.html %}

    <main class="page-content{% if page.wide %} page-content-wide{% endif %}">
      <h1 class="page-title">{{ page.title }}</h1>
      <div class="content">
        {{ content }}
      </div>
    </main>

    {% include canon-pocket-link.html %}
    {% include theme-toggle-script.html %}
  </body>
</html>
